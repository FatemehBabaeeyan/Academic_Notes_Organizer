{% extends "accounts/base.html" %}

{% block content %}

<h1>درس‌های من</h1>

<a href="{% url 'course_create' %}">
    ➕ افزودن درس
</a>

<hr>

{% for course in courses %}

<p>

<strong>{{ course.name }}</strong>

<br>

استاد: {{ course.professor }}

<br>

<br>
<a href="{% url 'note_list' course.id %}">
    📚 مشاهده جزوه‌ها
</a>
<br>

<a href="{% url 'course_update' course.pk %}">
✏️ ویرایش
</a>

<br>
<a href="{% url 'note_create' course.id %}">
    📄 افزودن جزوه
</a>

<br>
<a href="{% url 'course_delete' course.pk %}">
🗑 حذف
</a>

</p>
<hr>

{% empty %}

<p>هنوز درسی ثبت نشده است.</p>

{% endfor %}

{% endblock %}
